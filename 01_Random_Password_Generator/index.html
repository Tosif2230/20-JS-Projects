<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Password Generator</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="card">
      <h1 class="headline">Random Password Generator</h1>
      <div class="inp-field">
        <input type="text" id="input" readonly placeholder="Create Password" />
        <i class="fa-regular fa-clone fa-2x"></i>
      </div>
      <button class="generate-btn">Generate</button>
    </div>
    <div class="toast active">Password Coppied</div>
    <script src="script.js"></script>
  </body>
</html>
